services:
  postgres:
    image: postgres:16
    container_name: anotherme-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: anotherme2
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: anotherme-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  minio:
    image: minio/minio:latest
    container_name: anotherme-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb -p local/anotherme2-artifacts || true;
      exit 0;
      "

  anotherme-core:
    build:
      context: ./AnotherMe
    container_name: anotherme-core
    ports:
      - "3000:3000"
    working_dir: /app
    env_file:
      - ./AnotherMe/.env.local
    volumes:
      - anotherme_data:/app/data

  api-gateway:
    image: python:3.11-slim
    container_name: anotherme-api-gateway
    working_dir: /workspace/AnotherMe/anotherme2_engine
    env_file:
      - ./AnotherMe/anotherme2_engine/api_gateway/.env
    environment:
      PYTHONUNBUFFERED: "1"
    volumes:
      - ./:/workspace
    command: >
      /bin/sh -c "pip install --no-cache-dir -r requirements.txt &&
      python run_gateway.py"
    depends_on:
      - postgres
      - redis
      - minio
      - anotherme-core
    ports:
      - "8080:8080"

  api-gateway-worker:
    image: python:3.11-slim
    container_name: anotherme-api-gateway-worker
    working_dir: /workspace/AnotherMe/anotherme2_engine
    env_file:
      - ./AnotherMe/anotherme2_engine/api_gateway/.env
    environment:
      PYTHONUNBUFFERED: "1"
    volumes:
      - ./:/workspace
    command: >
      /bin/sh -c "pip install --no-cache-dir -r requirements.txt &&
      python run_gateway_worker.py"
    depends_on:
      - postgres
      - redis
      - minio
      - api-gateway

volumes:
  pg_data:
  redis_data:
  minio_data:
  anotherme_data:
